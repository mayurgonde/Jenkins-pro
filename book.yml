---
 - name: manage docker container
   hosts: all
   ignore_errors: yes
   tasks:
     - name: install docker
       yum:
         name: docker
         state: present
     - name: start and enable docker
       service:
         name: docker
         state: started
         enabled: yes
     - name: create directory
       file:
         path: /pro1
         state: directory
     - name: transfer docker file
       copy:
         src: Dockerfile
         dest: /pro1/
     - name: change owner and group owner
       command: chown itadmin:itadmin /pro1
     - name: add itadmin into docker group
       command: gpasswd -a itadmin docker
     - name: remove existing container
       shell: docker rm -f c1
     - name: remove existing image
       shell: docker rmi myweb
     - name: create container from docker file
       shell: cd /pro1; docker build -t myweb .
     - name: create docker container
       shell: docker run -dt --name=c1 -t -p 80:80 myweb
